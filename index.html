<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thalby – Redesign</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Google Fonts: Roboto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="assets/icons/title-icon.svg" type="image/x-icon">
</head>
<body>

    <!-- Header / Navbar Section -->
    <header class="border-bottom-custom py-3">
        <div class="container-fluid px-md-5">
            <nav class="navbar navbar-expand-lg p-0">
                <a class="navbar-brand fw-bold" href="#">thalbys</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                    <ul class="navbar-nav gap-lg-4">
                        <li class="nav-item"><a class="nav-link" href="#">Shop All</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Collections</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">The Thalby Guide</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Stories</a></li>
                    </ul>
                </div>
                <div class="d-none d-lg-flex gap-3 align-items-center">
                    <a href="#" class="text-dark text-decoration-none"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="text-dark text-decoration-none"><i class="bi bi-search"></i></a>
                    <a href="#" class="text-dark text-decoration-none"><i class="bi bi-cart"></i></a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <!-- Hero Section -->
        <section class="p-0 border-bottom-custom overflow-hidden">
            <div class="container-fluid p-0">
                <div class="row g-0">
                    <!-- Left Side: Text Content -->
                    <div class="col-lg-6 border-right-custom d-flex flex-column justify-content-center p-5 p-md-5">
                        <h1 class="mb-4">Fall deeper in love with humanity.</h1>
                        <p class="text-muted-custom mb-5 max-width-400">Get to know about the world around you. Our guides give you insights, culture insights and real people's stories that you won't find in a guidebook.</p>
                        <div>
                            <button class="btn btn-thalby">Shop Now</button>
                        </div>
                    </div>
                    <!-- Right Side: Image/Graphics -->
                    <div class="col-lg-6 bg-light d-flex align-items-center justify-content-center p-5">
                        <div class="hero-image-placeholder text-center">
                            <!-- Image asset placeholder -->
                            <img src="https://framerusercontent.com/images/Sb2NEmSyEbpOo1wPY1qjc2WUiKQ.webp" alt="Hero" class="img-fluid shadow-sm">
                        </div>
                    </div>
                </div>
            </div>
        </section>
       
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
</body>
</html>
